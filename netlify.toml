[build]
  publish = "."

# Serve all content JSON files with correct headers
[[headers]]
  for = "/content/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache"

# Redirect /admin to admin panel
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
