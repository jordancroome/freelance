# Copy of config — the CMS loads from the ROOT config.yml (/config.yml) to avoid 404 on Vercel.
# Edit the file at the project root: config.yml (not this file).
# GitHub backend for use with Vercel (OAuth via /api/auth and /api/callback).
# Set base_url to your production URL (e.g. https://yoursite.vercel.app).
# Create a GitHub OAuth App and set OAUTH_CLIENT_ID and OAUTH_CLIENT_SECRET in Vercel.
backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # e.g. jordancroome/freelance
  branch: main
  base_url: https://YOUR_VERCEL_URL.vercel.app   # Your live site URL (HTTPS)
  auth_endpoint: api/auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ─── SITE SETTINGS ────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        fields:
          - { label: "Eyebrow text", name: "eyebrow", widget: "string", default: "Product Designer · Melbourne & Cairns" }
          - { label: "Headline line 1", name: "headline1", widget: "string", default: "Design that" }
          - { label: "Headline line 2 (accent/italic)", name: "headline2", widget: "string", default: "converts" }
          - { label: "Headline line 3", name: "headline3", widget: "string", default: "and competes." }
          - { label: "Subheading (before service links)", name: "sub", widget: "text", default: "Expert-level branding, graphic design, and web design for founders, sole traders, and SMBs who want clarity, craft, and results. Based between Cairns and Melbourne, working across Australia." }
          - { label: "Service links (HTML fragment)", name: "sub_service_links_html", widget: "string", default: "<a href=\"/branding-cairns\">Branding</a> · <a href=\"/graphic-design-cairns\">Graphic design</a> · <a href=\"/services\">Web design</a>" }
          - { label: "Primary CTA label", name: "cta_primary", widget: "string", default: "Start a project" }
          - { label: "Secondary CTA label", name: "cta_secondary", widget: "string", default: "View work" }

      - name: "statement"
        label: "Statement Section"
        file: "content/statement.json"
        fields:
          - { label: "Section label", name: "label", widget: "string", default: "Who I work with" }
          - { label: "Heading", name: "heading", widget: "string", default: "Design that earns its place." }
          - { label: "Paragraph 1", name: "para1", widget: "text" }
          - { label: "Paragraph 2", name: "para2", widget: "text" }
          - { label: "Paragraph 3", name: "para3", widget: "text" }

      - name: "about"
        label: "About Section"
        file: "content/about.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Paragraph 1", name: "para1", widget: "text" }
          - { label: "Paragraph 2", name: "para2", widget: "text" }
          - { label: "Paragraph 3", name: "para3", widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Skills / Tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }

      - name: "cta"
        label: "Contact / CTA Section"
        file: "content/cta.json"
        fields:
          - { label: "Heading line 1", name: "heading1", widget: "string" }
          - { label: "Heading line 2 (italic/accent)", name: "heading2", widget: "string" }
          - { label: "Body text", name: "body", widget: "text" }
          - { label: "Email address", name: "email", widget: "string" }
          - { label: "Book / call CTA URL (contact page)", name: "booking_url", widget: "string", default: "/contact", hint: "Usually /contact — opens from “Book a 30-min call” and similar CTAs." }
          - { label: "Footer note", name: "footer_note", widget: "string" }

      - name: "contact_form"
        label: "Contact page — enquiry form"
        file: "content/contact-form.json"
        fields:
          - { label: "Form heading line 1", name: "form_heading1", widget: "string" }
          - { label: "Form heading line 2 (italic)", name: "form_heading2", widget: "string" }
          - { label: "Intro under heading", name: "form_intro", widget: "text" }
          - { label: "Form endpoint URL", name: "form_action", widget: "string", required: false, default: "/api/contact", hint: "/api/contact + Resend env vars, or Formspree URL" }
          - { label: "Email subject", name: "form_subject", widget: "string", default: "Website enquiry" }
          - { label: "Name label", name: "name_label", widget: "string", default: "Name" }
          - { label: "Email label", name: "email_label", widget: "string", default: "Email" }
          - { label: "Message label", name: "message_label", widget: "string", default: "Message" }
          - { label: "Submit label", name: "submit_label", widget: "string", default: "Send message" }
          - { label: "Success message", name: "success_message", widget: "string" }

      - name: "footer"
        label: "Footer"
        file: "content/footer.json"
        fields:
          - { label: "(Unused) Tagline under logo", name: "tagline", widget: "text", required: false, hint: "Removed from site." }
          - { label: "(Unused) Footer strip fields", name: "cta_line", widget: "string", required: false, hint: "Strip removed site-wide" }
          - { label: "(Unused)", name: "cta_action", widget: "string", required: false }
          - { label: "(Unused)", name: "cta_href", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "Contact email", name: "email", widget: "string" }
          - { label: "Location line", name: "location_line", widget: "string" }
          - { label: "Copyright line", name: "copyright", widget: "string" }

  # ─── WORK / PROJECTS ──────────────────────────────────────
  - name: "projects"
    label: "Work / Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    format: "json"
    extension: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client name", name: "client", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["product", "brand", "ux"] }
      - { label: "Category label (display)", name: "category_label", widget: "string", hint: "e.g. Product · SaaS" }
      - { label: "Cover image", name: "image", widget: "image" }
      - { label: "Collage (below text); optional override", name: "collage_image", widget: "image", required: false }
      - { label: "Showcase fallback if collage missing", name: "showcase_image", widget: "image", required: false }
      - { label: "Sort order (lower = first)", name: "order", widget: "number", default: 99 }
      - { label: "Featured (shows in grid)", name: "featured", widget: "boolean", default: true }
      - { label: "Link URL (optional)", name: "url", widget: "string", required: false }
      - { label: "Short description", name: "description", widget: "text", required: false }
      - { label: "Intro (one line for case study hero)", name: "intro", widget: "text", required: false }
      - { label: "The Challenge (left column)", name: "challenge", widget: "text", required: false }
      - { label: "The Solution (right column)", name: "solution", widget: "text", required: false }
      - { label: "Our Approach", name: "approach", widget: "text", required: false }
      - { label: "The Impact", name: "impact", widget: "text", required: false }
      - label: "Our Roles (list of roles/services)"
        name: "roles"
        widget: "list"
        required: false
        field: { label: "Role", name: "role", widget: "string" }
      - { label: "Case study index (e.g. 05)", name: "case_index", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Tagline (italic gradient under title)", name: "tagline", widget: "string", required: false }
      - { label: "Role line (meta row)", name: "role_line", widget: "string", required: false }
      - label: "Service tags (pills)"
        name: "display_tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "SEO description", name: "meta_description", widget: "text", required: false }
      - label: "Next project card (manual override)"
        name: "next_project"
        widget: "object"
        required: false
        collapsed: true
        hint: "Leave empty — next project is chosen automatically by Sort order."
        fields:
          - { label: "Slug", name: "slug", widget: "string", required: false }
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Client", name: "client", widget: "string", required: false }
          - { label: "Tagline", name: "tagline", widget: "string", required: false }
          - { label: "Year", name: "year", widget: "string", required: false }
          - { label: "Meta line", name: "meta", widget: "string", required: false }

  # ─── SERVICES ─────────────────────────────────────────────
  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Number (e.g. 01)", name: "number", widget: "string" }
      - { label: "Sort order", name: "order", widget: "number", default: 99 }
      - { label: "Body text", name: "body", widget: "text" }

  # ─── CLIENT LOGOS (Trusted by… marquee) ───────────────────
  - name: "clients"
    label: "Client Logos"
    folder: "content/clients"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    format: "json"
    extension: "json"
    fields:
      - { label: "Business name", name: "name", widget: "string", hint: "For alt text and reference" }
      - { label: "Logo", name: "logo", widget: "image", hint: "SVG or PNG. Shown in the Trusted by… scrolling bar." }
      - { label: "Sort order", name: "order", widget: "number", default: 99 }

  # ─── TESTIMONIALS ─────────────────────────────────────────
  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    identifier_field: "author_name"
    format: "json"
    extension: "json"
    fields:
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Author name", name: "author_name", widget: "string" }
      - { label: "Author role & company", name: "author_role", widget: "string" }
      - { label: "Author initial (for avatar)", name: "initial", widget: "string", hint: "Single letter shown in avatar circle" }
      - { label: "Sort order", name: "order", widget: "number", default: 99 }
