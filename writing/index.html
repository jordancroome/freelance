<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Jordan Croome</title>
  <meta name="description" content="Design perspectives on product, UX, and brand — plainly put." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f0ede8;--fg:#0e0e0e;--mid:#555;--accent:#ff6b00;--serif:'Instrument Serif',serif;--sans:'DM Sans',sans-serif;--ease:cubic-bezier(0.16,1,0.3,1)}
    body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-weight:300}
    a{color:inherit;text-decoration:none}
    ::selection{background:var(--accent);color:#000}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:24px 40px;background:rgba(240,237,232,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(14,14,14,.08)}
    .nav-logo{font-family:var(--serif);font-size:18px}.nav-logo span{color:var(--accent)}
    .nav-links{display:flex;gap:36px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;list-style:none}
    .nav-links a{position:relative}.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--accent);transition:width .3s}.nav-links a:hover::after,.nav-links a.active::after{width:100%}
    .nav-cta{font-size:13px;letter-spacing:.06em;text-transform:uppercase;border:1px solid rgba(14,14,14,.25);padding:10px 22px;border-radius:100px}.nav-cta:hover{background:var(--accent);border-color:var(--accent);color:#000}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer}.hamburger span{display:block;width:24px;height:1px;background:var(--fg)}
    #mobile-menu{position:fixed;inset:0;background:var(--bg);z-index:90;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:32px;opacity:0;pointer-events:none;transition:opacity .4s}
    #mobile-menu.open{opacity:1;pointer-events:all}#mobile-menu a{font-family:var(--serif);font-size:clamp(32px,8vw,56px)}
    main{padding:120px 40px 100px;max-width:1200px;margin:0 auto}
    .page-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);margin-bottom:20px}
    .page-title{font-family:var(--serif);font-size:clamp(36px,6vw,56px);line-height:1.05;margin-bottom:56px}
    .page-title em{font-style:italic;color:var(--accent)}
    .latest-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
    .latest-card{background:var(--bg);border:1px solid rgba(14,14,14,.08);padding:32px;transition:background .3s,box-shadow .3s}
    .latest-card:hover{background:#fff;box-shadow:0 4px 24px rgba(14,14,14,.06)}
    .latest-cat{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
    .latest-title{font-family:var(--serif);font-size:22px;line-height:1.25;margin-bottom:12px}
    .latest-excerpt{font-size:14px;color:var(--mid);line-height:1.6}
    .latest-meta{font-size:12px;color:var(--mid);margin-top:20px}
    .latest-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-top:20px;color:var(--mid);transition:color .2s,gap .25s}
    .latest-link:hover{color:var(--accent);gap:12px}
    footer{border-top:1px solid rgba(14,14,14,.12);padding:64px 40px 48px}
    .footer-top{display:grid;grid-template-columns:2fr 1fr;gap:48px;margin-bottom:48px}
    .footer-logo{font-family:var(--serif);font-size:22px}.footer-logo span{color:var(--accent)}
    .footer-tagline{font-size:14px;color:var(--mid)}
    .footer-col ul{list-style:none}.footer-col a{font-size:14px;color:var(--mid)}.footer-col a:hover{color:var(--accent)}
    .footer-bottom{border-top:1px solid rgba(14,14,14,.08);padding-top:24px;font-size:12px;color:var(--mid)}
    @media(max-width:1024px){.latest-grid{grid-template-columns:1fr}}
    @media(max-width:768px){nav{padding:18px 20px}.nav-links,.nav-cta{display:none}.hamburger{display:flex}main{padding:100px 20px 64px}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Jordan Croome<span>.</span></a>
  <ul class="nav-links">
    <li><a href="/work">Work</a></li>
    <li><a href="/services">Services</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/writing" class="active">Writing</a></li>
  </ul>
  <a href="/contact" class="nav-cta" id="nav-cta">Start a project</a>
  <div class="hamburger" id="hb"><span></span><span></span><span></span></div>
</nav>
<div id="mobile-menu">
  <a href="/">Home</a><a href="/work">Work</a><a href="/services">Services</a><a href="/about">About</a><a href="/writing">Writing</a><a href="/contact">Contact</a>
</div>
<main>
  <p class="page-label">Writing &amp; thinking</p>
  <h1 class="page-title">Design perspectives, <em>plainly</em> put.</h1>
  <div class="latest-grid" id="grid"></div>
</main>
<footer>
  <div class="footer-top">
    <div><a href="/" class="footer-logo" style="display:inline-block;color:inherit">Jordan Croome<span>.</span></a><div class="footer-tagline" id="ftag"></div></div>
    <div class="footer-col"><h4 style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:16px">Navigate</h4><ul style="display:flex;flex-direction:column;gap:10px"><li><a href="/work">Work</a></li><li><a href="/contact">Contact</a></li></ul></div>
  </div>
  <div class="footer-bottom"><span id="fcopy">© 2025 Jordan Croome.</span></div>
</footer>
<script>
const ART=['content/articles/2025-02-01-website-foundations.json','content/articles/2025-01-15-ux-principle.json','content/articles/2024-12-10-brand-consistency.json'];
async function load(p){try{const r=await fetch('/'+p);return r.ok?await r.json():null}catch{return null}}
Promise.all(ART.map(load)).then(rows=>{
  const g=document.getElementById('grid');
  rows.filter(Boolean).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(a=>{
    const d=new Date(a.date).toLocaleDateString('en-AU',{month:'long',year:'numeric'});
    g.innerHTML+=`<article class="latest-card"><div class="latest-cat">${a.category}</div><h2 class="latest-title">${a.title}</h2><p class="latest-excerpt">${a.excerpt}</p><div class="latest-meta">${a.read_time} · ${d}</div><a href="${a.url||'#'}" class="latest-link">Read article →</a></article>`;
  });
});
fetch('/content/footer.json').then(r=>r.json()).then(f=>{if(f.tagline)document.getElementById('ftag').textContent=f.tagline;if(f.copyright)document.getElementById('fcopy').textContent=f.copyright}).catch(()=>{});
fetch('/content/hero.json').then(r=>r.json()).then(h=>{if(h&&h.cta_primary)document.getElementById('nav-cta').textContent=h.cta_primary}).catch(()=>{});
document.getElementById('hb').onclick=()=>document.getElementById('mobile-menu').classList.toggle('open');
</script>
</body>
</html>
